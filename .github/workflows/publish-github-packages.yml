# Publishes com.arda:compose-code-smell-detector to:
# - GitHub Packages (always; uses GITHUB_TOKEN)
# - Maven Central via Sonatype (when SONATYPE_* + SIGNING_* repo secrets are set)
# Version: smell-detector/build.gradle.kts → projectVersion

name: Publish Maven packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-maven-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Publish to GitHub Packages (and Maven Central if secrets are set)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_SECRET_KEY: ${{ secrets.SIGNING_SECRET_KEY }}
          DEVELOPER_EMAIL: ${{ secrets.DEVELOPER_EMAIL }}
        run: |
          chmod +x gradlew
          if [ -n "$SONATYPE_USERNAME" ] && [ -n "$SONATYPE_PASSWORD" ] && \
             [ -n "$SIGNING_KEY_ID" ] && [ -n "$SIGNING_PASSWORD" ] && [ -n "$SIGNING_SECRET_KEY" ]; then
            echo "Publishing to GitHub Packages + Sonatype (Maven Central staging)"
            ./gradlew :smell-detector:publish --no-daemon --stacktrace
          else
            echo "Sonatype/signing secrets not fully set; publishing to GitHub Packages only"
            ./gradlew :smell-detector:publishMavenPublicationToGitHubPackagesRepository --no-daemon --stacktrace
          fi
