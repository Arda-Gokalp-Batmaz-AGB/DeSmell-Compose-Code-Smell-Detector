# Publishes com.arda:compose-code-smell-detector to this repo's GitHub Packages.
# Uses GITHUB_TOKEN (no personal PAT on your machine). Version comes from smell-detector/build.gradle.kts (projectVersion).

name: Publish to GitHub Packages

on:
  # Normal `git push` to a branch does NOT run this (avoids republishing the same version every commit).
  push:
    tags:
      - 'v*' # e.g. git tag v1.3.7 && git push origin v1.3.7
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-github-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Publish Maven package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x gradlew
          ./gradlew :smell-detector:publishMavenPublicationToGitHubPackagesRepository --no-daemon --stacktrace
